<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Premium Expense & Budget Visualizer</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body
    class="text-slate-100 min-h-screen antialiased selection:bg-indigo-500 selection:text-white pb-12"
  >
    <header
      class="max-w-6xl mx-auto px-4 pt-8 pb-4 flex justify-between items-center"
    >
      <div>
        <h1
          class="text-2xl font-bold tracking-tight bg-gradient-to-r from-indigo-400 via-purple-400 to-pink-400 bg-clip-text text-transparent"
        >
          Financely.
        </h1>
        <p class="text-xs text-slate-400 mt-1">
          Expense & Budget Visualizer Dashboard
        </p>
      </div>
      <div
        class="flex items-center gap-2 bg-slate-800/60 border border-slate-700/50 px-3 py-1.5 rounded-full text-xs text-slate-300"
      >
        <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
        Local Storage Active
      </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 mt-6 space-y-6">
      <div
        class="glass-card rounded-3xl p-8 relative overflow-hidden shadow-2xl shadow-indigo-950/40"
      >
        <div
          class="absolute -right-10 -top-10 w-40 h-40 bg-indigo-500/10 rounded-full blur-3xl"
        ></div>
        <div
          class="absolute -left-10 -bottom-10 w-40 h-40 bg-purple-500/10 rounded-full blur-3xl"
        ></div>

        <div class="relative z-10 text-center">
          <p
            class="text-sm font-medium uppercase tracking-widest text-indigo-300"
          >
            Total Balance
          </p>
          <h2
            id="total-balance"
            class="text-5xl font-extrabold tracking-tight mt-2 bg-gradient-to-r from-white to-slate-300 bg-clip-text text-transparent"
          >
            $0.00
          </h2>
        </div>
      </div>

      <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
        <section class="lg:col-span-5">
          <div
            class="glass-card rounded-2xl p-6 shadow-xl h-full flex flex-col justify-between"
          >
            <div>
              <h3
                class="text-lg font-semibold text-white mb-5 flex items-center gap-2"
              >
                <i class="fa-solid fa-circle-plus text-indigo-400"></i> Add
                Transaction
              </h3>

              <form id="transaction-form" class="space-y-4">
                <div>
                  <label class="block text-xs font-medium text-slate-400 mb-1.5"
                    >Item Name</label
                  >
                  <input
                    type="text"
                    id="item-name"
                    required
                    placeholder="e.g., Cilok Premium"
                    class="w-full bg-slate-900/60 border border-slate-700/60 rounded-xl px-4 py-3 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all"
                  />
                </div>

                <div class="grid grid-cols-2 gap-4">
                  <div>
                    <label
                      class="block text-xs font-medium text-slate-400 mb-1.5"
                      >Amount ($)</label
                    >
                    <input
                      type="number"
                      id="amount"
                      step="0.01"
                      required
                      placeholder="0.00"
                      class="w-full bg-slate-900/60 border border-slate-700/60 rounded-xl px-4 py-3 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all"
                    />
                  </div>
                  <div>
                    <label
                      class="block text-xs font-medium text-slate-400 mb-1.5"
                      >Category</label
                    >
                    <select
                      id="category"
                      required
                      class="w-full bg-slate-900/60 border border-slate-700/60 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all"
                    >
                      <option value="Food">Food</option>
                      <option value="Transport">Transport</option>
                      <option value="Fun">Fun</option>
                    </select>
                  </div>
                </div>

                <button
                  type="submit"
                  class="w-full bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-600 hover:to-purple-700 text-white font-medium text-sm py-3 px-4 rounded-xl shadow-lg shadow-indigo-500/20 hover:shadow-indigo-500/30 transition-all duration-200 mt-2 flex items-center justify-center gap-2"
                >
                  <i class="fa-solid fa-bolt text-xs"></i> Add Transaction
                </button>
              </form>
            </div>
          </div>
        </section>

        <section class="lg:col-span-7">
          <div class="glass-card rounded-2xl p-6 shadow-xl">
            <h3
              class="text-lg font-semibold text-white mb-4 flex items-center gap-2"
            >
              <i class="fa-solid fa-chart-pie text-purple-400"></i> Spending by
              Category
            </h3>
            <div class="relative flex justify-center items-center h-64">
              <canvas id="spending-chart"></canvas>
            </div>
          </div>
        </section>
      </div>

      <section class="w-full">
        <div class="glass-card rounded-2xl p-6 shadow-xl">
          <h3
            class="text-lg font-semibold text-white mb-4 flex items-center gap-2"
          >
            <i class="fa-solid fa-history text-pink-400"></i> Recent
            Transactions
          </h3>

          <div
            id="transaction-list"
            class="space-y-3 max-h-[350px] overflow-y-auto pr-2 custom-scrollbar"
          >
            <div
              class="text-center py-10 text-slate-500 text-sm"
              id="empty-state"
            >
              <i class="fa-solid fa-folder-open text-3xl mb-2 block"></i>
              No transactions yet. Start adding above!
            </div>
          </div>
        </div>
      </section>
    </main>

    <script src="js/app.js"></script>
  </body>
</html>
